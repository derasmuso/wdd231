<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Orem Chamber of Commerce</title>
    <meta name="description" content="">
    <meta name="author" content="Daniel Rasmuson">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/join-base.css">
    <link rel="stylesheet" href="styles/join-larger.css">


    <!-- JavaScript -->
    <script src="scripts/footer.js" defer></script>
    <script src="scripts/navigation.js" defer></script>



    <!--- FAVICON --->
    <link rel="icon" href="mountain.ico">

    <!--Social Media Tags-->
    <meta property="og:title" content="Utah Valley Chamber of Commerce">
    <meta property="og:description" content="">
    <meta property="og:url" content="https://www.uvcc.com/">
    <meta property="og:image" content="https://derasmuso.github.io/wdd231/chamber/images/mountains.svg">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <header>

        <div class="header-bottom">
            <div class="logo">
                <img src="images/mountains.svg" alt="site logo" width="512" height="512">
                <span>Orem Chamber of Commerce</span>
            </div>
            <button id="ham-btn" class="hamburger" aria-label="menu"></button>
        </div>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a class="current" href="#">Directory</a></li>
                <li><a href="#">Join</a></li>
                <li><a href="#">Discover</a></li>
            </ul>
        </nav>

    </header>



    <main>
        <form method="get" action="thankyou.html">
            <label for="firstName">First Name:</label>
            <input type="text" name="first" id="firstName" title="Enter your first name" autocomplete="given-name"
                required>

            <label for="lastName">Last Name:</label>
            <input type="text" name="last" id="lastName" title="Enter your last name" autocomplete="family-name"
                required>

            <label for="orgTitle">Organizational Title:</label>
            <input type="text" name="title" id="orgTitle" title="Enter your title" autocomplete="organization-title"
                pattern="[A-Za-z\- ]{7,}">

            <label for="userEmail">Email Address:</label>
            <input type="email" name="email" id="userEmail" title="Enter your email address" autocomplete="email"
                placeholder="example@email.com" required>

            <label for="mobilePhone">Mobile Phone Number:</label>
            <input type="tel" name="phone" id="mobilePhone" title="Enter your mobile phone number" autocomplete="tel"
                required>

            <label for="organizationName">Business/Organization Name:</label>
            <input type="text" name="organization" id="organizationName"
                title="Enter your business or organization's name" autocomplete="organization" required>

            <label for="membershipLevel">Membership Level:</label>
            <select name="membership" id="membershipLevel" title="Select your membership level" required>
                <option value="">-- Select a Membership Level --</option>
                <option value="np">NP Membership (non-profit)</option>
                <option value="bronze">Bronze Membership</option>
                <option value="silver">Silver Membership</option>
                <option value="gold">Gold Membership</option>
            </select>

            <label for="organizationDescription"></label>
            <textarea name="description" id="organizationDescription"
                title="Describe your business or organization"></textarea>

            <input type="hidden" name="timestamp" id="timestamp" value="">
            <input type="submit" value="Finish Application">
        </form>
    </main>
    <footer>
        <div class="contact">
            <p><strong>Orem Chamber of Commerce</strong></p>
            <p>56 N Main Street</p>
            <p>Orem, Utah 84058</p>
            <p>info@oremcc.org</p>
            <p>(801)-555-2300</p>
        </div>

        <div class="social">
            <a href="https://www.youtube.com/">
                <img src="images/youtube.svg" alt="youtube">
            </a>
            <a href="https://www.x.com/">
                <img src="images/twitter-x.svg" alt="twitter">
            </a>
            <a href="https://www.linkedin.com/">
                <img src="images/linkedin.svg" alt="linkedin">
            </a>
        </div>

        <div class="student">
            <p>WDD231 Commerce Project</p>
            <p>Daniel Rasmuson</p>
            <p id="currentyear"></p>
            <p id="lastModified"></p>
        </div>
    </footer>
</body>

</html>
