<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory</title>
    <meta name="description"
        content="A directory of local business and other organizations that belong to the chamber of commerce.">
    <meta name="author" content="Daniel Rasmuson">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/directory-base.css">
    <link rel="stylesheet" href="styles/directory-larger.css">

    <!-- JavaScript -->
    <script src="scripts/footer.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/members.js" defer></script>

    <!--- FAVICON --->
    <link rel="icon" href="mountain.ico">

    <!--Social Media Tags-->
    <meta property="og:title" content="Utah Valley Chamber of Commerce">
    <meta property="og:description"
        content="Explore the Orem Chamber of Commerce directory featuring local businesses, restaurants, and services.">
    <meta property="og:url" content="https://www.uvcc.com/">
    <meta property="og:image" content="https://derasmuso.github.io/wdd231/chamber/images/mountains.svg">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <header>

        <div class="header-bottom">
            <div class="logo">
                <img src="images/mountains.svg" alt="site logo" width="512" height="512">
                <span>Orem Chamber of Commerce</span>
            </div>
            <button id="ham-btn" class="hamburger" aria-label="menu"></button>
        </div>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a class="current" href="#">Directory</a></li>
                <li><a href="#">Join</a></li>
                <li><a href="#">Discover</a></li>
            </ul>
        </nav>

    </header>



    <main>

        <h1>Directory</h1>

        <div class="toggle">
            <button id="button-grid">Grid</button>
            <button id="button-list">List</button>
        </div>

        <div id="members-card"></div>

    </main>
    <footer>
        <div class="contact">
            <p><strong>Orem Chamber of Commerce</strong></p>
            <p>56 N Main Street</p>
            <p>Orem, Utah 84058</p>
            <p>info@oremcc.org</p>
            <p>(801)-555-2300</p>
        </div>

        <div class="social">
            <a href="https://www.youtube.com/">
                <img src="images/youtube.svg" alt="youtube">
            </a>
            <a href="https://www.x.com/">
                <img src="images/twitter-x.svg" alt="twitter">
            </a>
            <a href="https://www.linkedin.com/">
                <img src="images/linkedin.svg" alt="linkedin">
            </a>
        </div>

        <div class="student">
            <p>WDD231 Commerce Project</p>
            <p>Daniel Rasmuson</p>
            <p id="currentyear"></p>
            <p id="lastModified"></p>
        </div>
    </footer>
</body>

</html>
